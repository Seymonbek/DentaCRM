[project]
path = "."
brief_file = "PROJECT_BRIEF.md"
test_command = ""
logs_dir = ".agentloop/runs"
exclude_dirs = ["node_modules", "__pycache__", ".venv", "dist", "build"]
snapshot_exclude = ["\\.git/", "\\.agentloop/", "node_modules/", "\\.venv/", "__pycache__/", "dist/", "build/"]

# Backend tests
# [[project.tests]]
# name = "backend"
# command = "cd backend && python -m pytest --tb=short -q"
# cwd = "."
# timeout_sec = 300

# Frontend tests
# [[project.tests]]
# name = "frontend"
# command = "cd frontend && npm run test -- --run"
# cwd = "."
# timeout_sec = 120

[loop]
plan_cycles = 5
review_cycles = 3
build_iterations = 12
no_change_limit = 2
sleep_between_rounds_sec = 0
max_total_builds = 80
max_discovery_rounds = 3
parallel_review = true
max_parallel_builders = 3

[retry]
max_attempts = 3
backoff_base = 2
backoff_max = 60
jitter = true

[budget]
max_cost_usd = 0
warn_at_pct = 80
cost_per_build_usd = 0.15
cost_per_review_usd = 0.05
cost_per_plan_usd = 0.10

[agents.planner]
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
trust_all_tools = true

[agents.builder]
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_all_tools = true

[agents.reviewer]
command = "kiro-cli"
agent = "ai-reviewer"
timeout_sec = 3600
trust_all_tools = true

[kiro]
enabled = true
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
resume = false
trust_tools = ""
trust_all_tools = true
require_mcp_startup = false

[kiro_builder]
enabled = true
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_tools = "read,write,grep,shell"
trust_all_tools = true

[telegram]
enabled = false
bot_token = ""
chat_id = ""

[git]
auto_push = false
branch = "main"
commit_message = "feat(dentacrm): automated build by orchestrator"
