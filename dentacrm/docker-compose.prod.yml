# =============================================================================
# DentaCRM — PRODUCTION stack.
#
# Bring up:
#   cp .env.prod.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences vs docker-compose.yml (dev):
#   * No bind-mounts of source; every service runs a baked image.
#   * Backend uses gunicorn (config.wsgi:application) behind an internal
#     network. The frontend nginx container is the only public ingress.
#   * DJANGO_SETTINGS_MODULE=config.settings.prod enforces DEBUG=0,
#     HSTS, secure cookies, S3 media storage.
#   * MinIO is included but disabled by default (profile "minio"); real
#     deployments should point S3_ENDPOINT_URL at their managed S3.
#   * Postgres/Redis are not published to the host — they're only reachable
#     via the internal `dentacrm_prod` network.
#
# One-command test:
#   docker compose -f docker-compose.prod.yml config     # validate
#   docker compose -f docker-compose.prod.yml build       # build images
# =============================================================================

name: dentacrm-prod

# -----------------------------------------------------------------------------
# Shared backend image config.
# -----------------------------------------------------------------------------
x-backend-image: &backend-image
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: dentacrm-backend:prod
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
    DJANGO_DEBUG: "0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with btree_gist enabled at init.
  # NOT published to the host — accessible only via internal network.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dentacrm-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentacrm}
      POSTGRES_USER: ${POSTGRES_USER:-dentacrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentacrm} -d ${POSTGRES_DB:-dentacrm}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — cache + Celery broker + result backend.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dentacrm-redis-prod
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--requirepass"
      - "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-}\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — optional local S3. Enabled with `--profile minio`.
  # For real deployments, point S3_ENDPOINT_URL at managed S3 and skip this.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: dentacrm-minio-prod
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Django backend — gunicorn WSGI.
  # Runs migrate + collectstatic on startup, then serves on :8000 to the
  # internal network. Public traffic reaches it only through the frontend
  # nginx container's /api/ and /admin/ locations.
  # ---------------------------------------------------------------------------
  backend:
    <<: *backend-image
    container_name: dentacrm-backend-prod
    command:
      - "bash"
      - "-lc"
      - >
        set -eu;
        python manage.py migrate --noinput;
        python manage.py collectstatic --noinput --clear;
        exec gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers ${GUNICORN_WORKERS:-4}
          --threads ${GUNICORN_THREADS:-2}
          --timeout ${GUNICORN_TIMEOUT:-60}
          --graceful-timeout 30
          --access-logfile -
          --error-logfile -
          --log-level ${GUNICORN_LOG_LEVEL:-info}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Celery worker.
  # ---------------------------------------------------------------------------
  celery_worker:
    <<: *backend-image
    container_name: dentacrm-celery-worker-prod
    command:
      - "bash"
      - "-lc"
      - >
        exec celery -A config worker
          --loglevel=${CELERY_LOG_LEVEL:-INFO}
          --concurrency=${CELERY_CONCURRENCY:-4}
          --max-tasks-per-child=200
    volumes:
      - backend_media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$(hostname) >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery beat (scheduled tasks).
  # ---------------------------------------------------------------------------
  celery_beat:
    <<: *backend-image
    container_name: dentacrm-celery-beat-prod
    command:
      - "bash"
      - "-lc"
      - >
        exec celery -A config beat
          --loglevel=${CELERY_LOG_LEVEL:-INFO}
          --scheduler=django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Telegram bot (Aiogram — polling in this image; can be switched to
  # webhook mode by pointing TELEGRAM_WEBHOOK_URL at a public HTTPS host).
  # ---------------------------------------------------------------------------
  bot:
    <<: *backend-image
    container_name: dentacrm-bot-prod
    command:
      - "bash"
      - "-lc"
      - >
        exec python manage.py run_telegram_bot
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'manage.py run_telegram_bot' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend — built Vite bundle served by nginx, which also reverse-proxies
  # /api/, /admin/, /media/, /static/ to the backend gunicorn.
  # This is the only container exposed to the host.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_REFRESH_STORAGE: ${VITE_REFRESH_STORAGE:-memory}
    image: dentacrm-frontend:prod
    container_name: dentacrm-frontend-prod
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
      NGINX_PORT: "80"
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Named volumes.
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    name: dentacrm_prod_postgres_data
  redis_data:
    name: dentacrm_prod_redis_data
  minio_data:
    name: dentacrm_prod_minio_data
  backend_media:
    name: dentacrm_prod_backend_media
  backend_static:
    name: dentacrm_prod_backend_static

networks:
  default:
    name: dentacrm_prod
