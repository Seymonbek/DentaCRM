# =============================================================================
# DentaCRM — development stack.
#
# Bring up the whole environment:
#   docker compose up --build
#
# Individual data services (useful before Django code exists, per T1):
#   docker compose up postgres redis minio
#
# All services read secrets/config from the `.env` file at the project root.
# =============================================================================

name: dentacrm

# -----------------------------------------------------------------------------
# Shared YAML anchors — keep backend-derived services in sync.
# -----------------------------------------------------------------------------
x-backend-image: &backend-image
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: dentacrm-backend:dev
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
  volumes:
    - ./backend:/app
    - backend_media:/app/media
    - backend_static:/app/staticfiles
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with btree_gist enabled at init.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dentacrm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentacrm}
      POSTGRES_USER: ${POSTGRES_USER:-dentacrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dentacrm}
      # Ensure init scripts run with UTF-8 / C collation for deterministic
      # ordering in tests (matches PROJECT_BRIEF constraints).
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentacrm} -d ${POSTGRES_DB:-dentacrm}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — cache + Celery broker + result backend.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dentacrm-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (media + backups) for local dev.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: dentacrm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${HOST_MINIO_API_PORT:-9000}:9000"   # S3 API
      - "${HOST_MINIO_CONSOLE_PORT:-9001}:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO one-shot bucket bootstrapper.
  # Creates the media + backups buckets and sets media to public-read so
  # the browser can load treatment photo thumbnails directly.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-08-13T05-33-17Z
    container_name: dentacrm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-dentacrm-media}
      S3_BUCKET_BACKUPS: ${S3_BUCKET_BACKUPS:-dentacrm-backups}
    entrypoint: >
      /bin/sh -c "
        set -eu;
        until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" >/dev/null 2>&1; do
          echo 'waiting for minio...'; sleep 1;
        done;
        mc mb --ignore-existing local/$${S3_BUCKET_MEDIA};
        mc mb --ignore-existing local/$${S3_BUCKET_BACKUPS};
        mc anonymous set download local/$${S3_BUCKET_MEDIA} || true;
        echo 'minio buckets ready';
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Django backend (Gunicorn is only used in prod; dev runs runserver).
  # ---------------------------------------------------------------------------
  backend:
    <<: *backend-image
    container_name: dentacrm-backend
    command: >
      bash -lc "
        if [ -f manage.py ]; then
          python manage.py migrate --noinput &&
          python manage.py runserver 0.0.0.0:8000;
        else
          echo 'manage.py not found — T1 skeleton only. Waiting.';
          tail -f /dev/null;
        fi
      "
    ports:
      - "${HOST_BACKEND_PORT:-8000}:8000"
    healthcheck:
      # /api/docs/ is added in T2. Until then, fall back to a bare TCP probe
      # via curl on the base URL so `docker compose up` does not stall.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/docs/ >/dev/null 2>&1 || curl -fsS http://localhost:8000/ >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Celery worker.
  # ---------------------------------------------------------------------------
  celery_worker:
    <<: *backend-image
    container_name: dentacrm-celery-worker
    command: >
      bash -lc "
        if [ -f manage.py ]; then
          celery -A config worker --loglevel=INFO --concurrency=2;
        else
          echo 'manage.py not found — T1 skeleton only. Waiting.';
          tail -f /dev/null;
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery' >/dev/null || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Celery beat (scheduled tasks).
  # ---------------------------------------------------------------------------
  celery_beat:
    <<: *backend-image
    container_name: dentacrm-celery-beat
    command: >
      bash -lc "
        if [ -f manage.py ]; then
          celery -A config beat --loglevel=INFO --scheduler=django_celery_beat.schedulers:DatabaseScheduler;
        else
          echo 'manage.py not found — T1 skeleton only. Waiting.';
          tail -f /dev/null;
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery' >/dev/null || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Telegram bot (Aiogram — polling in dev, webhook in prod).
  # ---------------------------------------------------------------------------
  bot:
    <<: *backend-image
    container_name: dentacrm-bot
    command: >
      bash -lc "
        if [ -f manage.py ] && [ -d apps/telegram_bot ]; then
          python manage.py run_telegram_bot;
        else
          echo 'telegram_bot app not found — T1 skeleton only. Waiting.';
          tail -f /dev/null;
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Frontend — Vite dev server (T5 replaces the placeholder with the real app).
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dentacrm-frontend:dev
    container_name: dentacrm-frontend
    env_file:
      - .env
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${HOST_FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5173/ >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Named volumes — declared explicitly for clarity and portability.
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    name: dentacrm_postgres_data
  redis_data:
    name: dentacrm_redis_data
  minio_data:
    name: dentacrm_minio_data
  backend_media:
    name: dentacrm_backend_media
  backend_static:
    name: dentacrm_backend_static
  frontend_node_modules:
    name: dentacrm_frontend_node_modules

networks:
  default:
    name: dentacrm_default
