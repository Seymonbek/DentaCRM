{% load i18n %}

<div class="relative" x-data="{ openUserLinks: false }">
    <a class="block cursor-pointer hover:text-gray-700 dark:text-gray-300 dark:hover:text-gray-200" @click="openUserLinks = !openUserLinks">
        <span class="material-symbols-outlined">person</span>
    </a>

    <nav class="absolute bg-white border flex flex-col leading-none overflow-hidden py-1 -right-2 rounded shadow-lg text-sm text-gray-500 top-7 w-64 z-50 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300" x-cloak x-show="openUserLinks" @click.outside="openUserLinks = false">
        <div class="border-b border-gray-100 flex flex-row flex-shrink-0 items-center justify-start mb-1 pb-2 pt-2 px-4 dark:border-gray-700">
            <span class="material-symbols-outlined md-18 text-gray-400 dark:text-gray-500 mr-3">account_circle</span>
            <span class="block truncate font-semibold text-gray-700 dark:text-gray-200">
                {% firstof user.get_short_name user.get_username %}
            </span>
        </div>

        {% if site_url %}
            <a href="{{ site_url }}" target="_blank" class="mx-1 px-3 py-2 mt-1 rounded flex items-center whitespace-nowrap hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-700 dark:hover:text-gray-200">
                <span class="material-symbols-outlined md-18 mr-3 text-gray-400 dark:text-gray-500">visibility</span>
                <span>Saytni ko'rish</span>
            </a>
        {% endif %}

        {% if user.has_usable_password %}
            <a href="{% url 'admin:password_change' %}" class="mx-1 px-3 py-2 mb-1 rounded flex items-center whitespace-nowrap hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-700 dark:hover:text-gray-200">
                <span class="material-symbols-outlined md-18 mr-3 text-gray-400 dark:text-gray-500">lock</span>
                <span>Parolni o'zgartirish</span>
            </a>
        {% endif %}

        <div class="border-t mt-1 pt-1 dark:border-gray-700">
            <form id="logout-form" method="post" action="{% url 'admin:logout' %}" class="mx-1">
                {% csrf_token %}

                <button type="submit" class="bg-none flex items-center px-3 py-2 text-left text-red-500 rounded w-full whitespace-nowrap hover:bg-red-100 dark:hover:bg-red-500/20 dark:hover:text-red-500">
                    <span class="material-symbols-outlined md-18 mr-3 text-red-400 dark:text-red-500">logout</span>
                    <span>Tizimdan chiqish</span>
                </button>
            </form>
        </div>
    </nav>
</div>
