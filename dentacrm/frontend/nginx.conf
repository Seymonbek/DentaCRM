# =============================================================================
# DentaCRM frontend — nginx site config (production).
#
# This file is a template consumed by the upstream nginx:alpine
# entrypoint, which runs `envsubst` over $BACKEND_HOST, $BACKEND_PORT and
# $NGINX_PORT before nginx starts. Only those three variables are
# substituted — every other `$var` is preserved verbatim.
#
# Responsibilities:
#   1. Serve the Vite SPA (client-side routing → fallback to /index.html)
#   2. Reverse-proxy /api/  → backend gunicorn
#   3. Reverse-proxy /media/ → backend (or S3, if configured upstream)
#   4. Handle websocket upgrades for /api/telegram-webhook/ etc.
#   5. Gzip static assets, long-cache immutable bundle files
# =============================================================================

# Only $BACKEND_HOST, $BACKEND_PORT, and $NGINX_PORT are substituted at
# container start-up; every other $var below is left untouched for nginx
# to evaluate at request time.

upstream dentacrm_backend {
    server ${BACKEND_HOST}:${BACKEND_PORT};
    keepalive 16;
}

# Map for websocket upgrade handling (used by /api/ locations).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       ${NGINX_PORT} default_server;
    listen       [::]:${NGINX_PORT} default_server;
    server_name  _;

    # ------------------------------------------------------------------
    # Hardening headers
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-XSS-Protection "0" always;

    # ------------------------------------------------------------------
    # Gzip
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ------------------------------------------------------------------
    # Upload / request-body limits — treatment photos, xrays.
    # ------------------------------------------------------------------
    client_max_body_size 20m;

    # ------------------------------------------------------------------
    # Root — the built Vite SPA lives here.
    # ------------------------------------------------------------------
    root   /usr/share/nginx/html;
    index  index.html;

    # ------------------------------------------------------------------
    # Cheap liveness for docker healthchecks.
    # ------------------------------------------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ------------------------------------------------------------------
    # Long-cache immutable Vite bundle files (index-<hash>.js|css|woff2)
    # ------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # Backend API — REST endpoints.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://dentacrm_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering    off;
    }

    # ------------------------------------------------------------------
    # Backend media — treatment photos, xrays.
    # If STORAGES points at S3 in prod this location is unused, but we
    # still forward for FileField-based fallbacks.
    # ------------------------------------------------------------------
    location /media/ {
        proxy_pass         http://dentacrm_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ------------------------------------------------------------------
    # Django admin static files.
    # ------------------------------------------------------------------
    location /static/ {
        proxy_pass         http://dentacrm_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 1d;
    }

    # ------------------------------------------------------------------
    # Django admin panel.
    # ------------------------------------------------------------------
    location /admin/ {
        proxy_pass         http://dentacrm_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # SPA fallback — every unknown path renders index.html so React
    # Router can take over on the client. This must be LAST so it does
    # not shadow /api/, /media/, /admin/, or /assets/.
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Custom error pages — fall back to the SPA so client-side routing
    # can render its own 404 view.
    # ------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
